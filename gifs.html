<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <title>gifs | manskron.github.io</title>
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <meta name="description"
          content="Look at these cool gifs">
    <style>
        h1 {
            color: red;
            font-family: sans-serif;

        img {
            object-fit: none;
        }

        figcaption {
            max-width: 200px;
        }

    </style>
</head>
<body>

<nav>
    <ul class="menu">
        <li class="menu-item"><a href="/">< Home</a></li>
    </ul>

<main>
    <h1>GIFS</h1>
    <div class="gifs">
        <figure>
            <img src="/assets/gifs/cd.gif" alt="cyberdemon"/>
            <figcaption>Cyberdemon walking aggressively.</figcaption>
        </figure>
        <figure>
            <img src="/assets/gifs/torch.gif" alt="torch"/>
            <figcaption>Torch burning sensually.</figcaption>
        </figure>
        <figure>
            <img src="/assets/gifs/guestbook.gif" alt="guestbook"/>
            <figcaption>Old man writing CSS fan-fiction in a B&B guestbook.</figcaption>
        </figure>
        <figure>
            <img src="/assets/gifs/lightning.gif" alt="lightning"/>

        </figure>
        <figure>
            <img src="/assets/gifs/book.gif" alt="book"/>
            <figcaption>A book of sorts.</figcaption>
        </figure>
        <figure>
            <img src="/assets/gifs/party.gif" alt="party"/>
            <figcaption>A party.</figcaption>
        </figure>
        <figure>
            <img src="/assets/gifs/skel.gif" alt="dancing skeleton"/>

        </figure>
        <figure>

            </figcaption>

</html>
